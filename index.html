<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TruckGuard</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #f5f5f5;
      --muted: #b5b5b5;
      --good: #22c55e;
      --caution: #eab308;
      --warning: #f97316;
      --critical: #ef4444;
      --button-bg: #171717;
      --button-border: #2b2b2b;
      --disconnected: #6b7280;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #111111 0%, var(--bg) 58%);
      color: var(--fg);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding-top: max(14px, env(safe-area-inset-top));
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }

    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.92rem;
      position: relative;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      user-select: none;
      cursor: pointer;
    }

    .logo {
      font-weight: 700;
      color: #f3f3f3;
    }

    .demo-badge {
      display: none;
      font-size: 0.64rem;
      padding: 2px 7px;
      border: 1px solid #3b3b3b;
      border-radius: 999px;
      color: #fbbf24;
      letter-spacing: 0.12em;
    }

    .demo-badge.active {
      display: inline-block;
    }

    .connection-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
    }

    .connection-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--disconnected);
      box-shadow: 0 0 8px rgba(107, 114, 128, 0.65);
      transition: all 180ms ease;
    }

    .connection-dot.connected {
      background: var(--good);
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.85);
    }

    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 18px;
      gap: 20px;
      text-align: center;
    }

    .status-circle {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: var(--good);
      color: var(--good);
      box-shadow: 0 0 22px rgba(34, 197, 94, 0.65), 0 0 92px rgba(34, 197, 94, 0.3);
      transition: all 0.6s ease;
    }

    .status-circle.pulse-warning {
      animation: pulse 1.6s infinite;
    }

    .status-circle.pulse-critical {
      animation: pulse 0.85s infinite;
    }

    .alert-label {
      font-size: 0.9rem;
      color: #e6e6e6;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: all 0.6s ease;
    }

    .status-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .last-checkin-text {
      font-size: 0.74rem;
      color: #9ca3af;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.6s ease;
    }

    .history-toggle {
      border: 1px solid #303030;
      border-radius: 999px;
      background: #171717;
      color: #d1d5db;
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.6s ease;
    }

    .history-panel {
      width: min(360px, 92vw);
      background: rgba(18, 18, 18, 0.96);
      border: 1px solid #303030;
      border-radius: 12px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(14px);
      transition: all 0.35s ease;
    }

    .history-panel.open {
      max-height: 220px;
      opacity: 1;
      transform: translateY(0);
    }

    .history-header {
      padding: 10px 12px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9ca3af;
      text-align: left;
    }

    .history-list {
      list-style: none;
      margin: 0;
      padding: 8px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      color: #d1d5db;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .history-item .score {
      font-weight: 700;
      color: #f3f4f6;
    }

    .bottombar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 14px;
      margin-bottom: 10px;
    }

    button {
      border: 1px solid var(--button-border);
      border-radius: 14px;
      height: 80px;
      width: 100%;
      color: #fafafa;
      background: var(--button-bg);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 1rem;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.985);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .speaking-indicator {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: max(8px, env(safe-area-inset-bottom));
      height: 34px;
      border-radius: 10px;
      border-top: 1px solid #1f2937;
      background: linear-gradient(90deg, rgba(17, 24, 39, 0.5) 0%, rgba(17, 24, 39, 0.1) 100%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 8;
      pointer-events: none;
    }

    .waveform {
      height: 26px;
      display: flex;
      gap: 6px;
      align-items: flex-end;
      opacity: 0.35;
      transition: all 0.6s ease;
      margin-bottom: 3px;
    }

    .waveform-bar {
      width: 6px;
      height: 16px;
      border-radius: 3px;
      background: #22c55e;
      transform-origin: bottom center;
      animation: wave 0.95s ease-in-out infinite;
      animation-play-state: paused;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.55);
    }

    .waveform-bar:nth-child(2) {
      animation-duration: 0.8s;
    }

    .waveform-bar:nth-child(3) {
      animation-duration: 1.2s;
    }

    .waveform-bar:nth-child(4) {
      animation-duration: 0.65s;
    }

    body.speaking .waveform {
      opacity: 1;
    }

    body.speaking .waveform-bar {
      animation-play-state: running;
    }

    .edge-flash {
      pointer-events: none;
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0);
      opacity: 0;
    }

    .edge-flash.active {
      opacity: 1;
      animation: edge-critical 0.45s infinite alternate;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(5, 5, 5, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 18px;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-card {
      width: 100%;
      max-width: 420px;
      border: 1px solid #2a2a2a;
      background: #111111;
      border-radius: 14px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .overlay-card h2 {
      margin: 0;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .overlay-card input {
      height: 56px;
      border-radius: 10px;
      border: 1px solid #343434;
      background: #0f0f0f;
      color: #f3f3f3;
      padding: 0 14px;
      font-size: 1rem;
    }

    .overlay-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .overlay-actions button {
      height: 62px;
      font-size: 0.95rem;
    }

    @keyframes pulse {
      0%,
      100% { box-shadow: 0 0 0 0 currentColor; }
      50% { box-shadow: 0 0 40px 10px currentColor; }
    }

    @keyframes edge-critical {
      from { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0.1); }
      to { box-shadow: inset 0 0 0 12px rgba(239, 68, 68, 0.45); }
    }

    @keyframes wave {
      0%,
      100% { transform: scaleY(0.45); }
      50% { transform: scaleY(1.8); }
    }

    .assistant-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5, 5, 5, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .assistant-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .assistant-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #3b82f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.5);
      animation: assistant-pulse 1.5s ease-in-out infinite;
    }

    .assistant-label {
      font-size: 0.9rem;
      color: #93c5fd;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .assistant-question {
      font-size: 0.85rem;
      color: #d1d5db;
      max-width: 280px;
      text-align: center;
      min-height: 40px;
      font-style: italic;
    }

    .wake-indicator {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      color: #4b5563;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 9;
    }

    .wake-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4b5563;
    }

    .wake-dot.listening {
      background: #3b82f6;
      box-shadow: 0 0 6px #3b82f6;
      animation: assistant-pulse 1s ease-in-out infinite;
    }

    @keyframes assistant-pulse {
      0%,
      100% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.5); }
      50% { box-shadow: 0 0 70px rgba(59, 130, 246, 0.9); }
    }

    @media (max-width: 420px) {
      .status-circle {
        width: 260px;
        height: 260px;
      }

      .bottombar {
        gap: 8px;
      }

      button {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div id="logoTap" class="logo-wrap" aria-label="TruckGuard logo">
        <div class="logo">TruckGuard</div>
        <div id="demoBadge" class="demo-badge">Demo</div>
      </div>
      <div class="connection-wrap">
        <span>Server</span>
        <span id="connectionDot" class="connection-dot" aria-label="Server connection indicator"></span>
      </div>
    </div>

    <main class="center">
      <div id="statusCircle" class="status-circle" aria-hidden="true"></div>
      <div id="alertLabel" class="alert-label">All Clear</div>
      <div class="status-meta">
        <div id="lastCheckInText" class="last-checkin-text">Last check-in: never</div>
        <button id="historyToggle" class="history-toggle" type="button" aria-label="Show recent check-in history">H</button>
      </div>
      <div id="historyPanel" class="history-panel" aria-label="Recent check-in history">
        <div class="history-header">Recent Scores</div>
        <ul id="historyList" class="history-list">
          <li class="history-item">No check-ins yet</li>
        </ul>
      </div>
    </main>

    <div class="bottombar">
      <button id="startShiftBtn" type="button">Start Shift</button>
      <button id="checkInBtn" type="button" disabled>Check In</button>
    </div>

    <div class="speaking-indicator" aria-hidden="true">
      <div class="waveform">
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
      </div>
    </div>
    <div id="edgeFlash" class="edge-flash" aria-hidden="true"></div>

    <div id="startOverlay" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Start shift">
      <div class="overlay-card">
        <h2>Start Shift</h2>
        <input id="driverNameInput" type="text" placeholder="Driver name" maxlength="40" />
        <input id="truckIdInput" type="text" placeholder="Truck ID" maxlength="40" />
        <div class="overlay-actions">
          <button id="cancelStartBtn" type="button">Cancel</button>
          <button id="confirmStartBtn" type="button">Start</button>
        </div>
      </div>
    </div>

    <div class="wake-indicator">
      <div id="wakeDot" class="wake-dot"></div>
      <span id="wakeLabel">Say "okay truckguard"</span>
    </div>

    <div id="assistantOverlay" class="assistant-overlay">
      <div class="assistant-ring">&#127897;</div>
      <div class="assistant-label" id="assistantLabel">Listening...</div>
      <div class="assistant-question" id="assistantQuestion"></div>
    </div>
  </div>

  <script>
    const SERVER = 'http://localhost:3000';
    const VOICE_ID = '21m00Tcm4TlvDq8ikWAM';

    let sessionState = {
      sessionId: null,
      driverName: 'Driver',
      startTime: null,
      checkInCount: 0,
      currentLevel: 'NORMAL',
      checkInInterval: null,
      demoMode: false,
      demoScenarioIndex: 0,
      lastCheckInAt: null,
      recentScores: [],
      micReady: false
    };

    const demoScenarios = [
      { transcript: 'Yeah feeling good, just had some coffee', latencyMs: 900 },
      { transcript: 'fine', latencyMs: 2400 },
      { transcript: 'kinda tired honestly been a long one', latencyMs: 3100 },
      { transcript: '', latencyMs: 5500 }
    ];

    const statusCircle = document.getElementById('statusCircle');
    const alertLabel = document.getElementById('alertLabel');
    const checkInBtn = document.getElementById('checkInBtn');
    const startShiftBtn = document.getElementById('startShiftBtn');
    const connectionDot = document.getElementById('connectionDot');
    const edgeFlash = document.getElementById('edgeFlash');
    const startOverlay = document.getElementById('startOverlay');
    const driverNameInput = document.getElementById('driverNameInput');
    const truckIdInput = document.getElementById('truckIdInput');
    const confirmStartBtn = document.getElementById('confirmStartBtn');
    const cancelStartBtn = document.getElementById('cancelStartBtn');
    const logoTap = document.getElementById('logoTap');
    const demoBadge = document.getElementById('demoBadge');
    const lastCheckInText = document.getElementById('lastCheckInText');
    const historyToggle = document.getElementById('historyToggle');
    const historyPanel = document.getElementById('historyPanel');
    const historyList = document.getElementById('historyList');
    const assistantOverlay = document.getElementById('assistantOverlay');
    const assistantLabel = document.getElementById('assistantLabel');
    const assistantQuestion = document.getElementById('assistantQuestion');
    const wakeDot = document.getElementById('wakeDot');
    const wakeLabel = document.getElementById('wakeLabel');

    let wakeRecognition = null;
    let assistantActive = false;
    let wakeWordEnabled = false;
    let wakeWordSuspended = false;

    const WAKE_PHRASES = [
      'okay truckguard',
      'ok truckguard',
      'hey truckguard',
      'truckguard',
      'okay truck guard',
      'ok truck guard',
      'hey truck guard',
      'truck guard',
      'okay truck gard',
      'ok truck gard',
      'truck gard',
      'truck gaurd',
      'truck gurard',
      'truck gaurd',
      'truck gurd',
      'truck gaurd',
      'truck'
    ];

    function normalizeSpeechText(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function isWakePhraseDetected(transcript) {
      const normalized = normalizeSpeechText(transcript);
      if (!normalized) return false;

      if (WAKE_PHRASES.some((phrase) => normalized.includes(phrase))) {
        return true;
      }

      const hasTruck = /\btruck\b|\btruckguard\b/.test(normalized);
      const hasGuardLike = /\bguard\b|\bgaurd\b|\bgard\b|\bgurd\b|\bgurard\b/.test(normalized);
      const hasTriggerWord = /\bok\b|\bokay\b|\bhey\b/.test(normalized);

      return hasTruck && hasGuardLike && hasTriggerWord;
    }

    function renderHistory() {
      if (!sessionState.recentScores.length) {
        historyList.innerHTML = '<li class="history-item">No check-ins yet</li>';
        return;
      }

      historyList.innerHTML = sessionState.recentScores
        .slice()
        .reverse()
        .map((entry) => `<li class="history-item"><span>${entry.level}</span><span class="score">Score ${entry.score}</span></li>`)
        .join('');
    }

    function updateLastCheckInText() {
      if (!sessionState.lastCheckInAt) {
        lastCheckInText.textContent = 'Last check-in: never';
        return;
      }

      const minutes = Math.max(0, Math.floor((Date.now() - sessionState.lastCheckInAt) / 60000));
      if (minutes < 1) {
        lastCheckInText.textContent = 'Last check-in: just now';
        return;
      }
      lastCheckInText.textContent = `Last check-in: ${minutes} min${minutes === 1 ? '' : 's'} ago`;
    }

    function normalizeServerLevel(level, score) {
      const clean = (level || '').toString().trim().toUpperCase();
      if (clean === 'NORMAL' || clean === 'CAUTION' || clean === 'WARNING' || clean === 'CRITICAL') {
        return clean;
      }
      if (clean === 'LOW') return 'NORMAL';
      if (clean === 'MEDIUM') return 'CAUTION';
      if (clean === 'HIGH') return Number(score) >= 9 ? 'CRITICAL' : 'WARNING';

      const numeric = Number(score);
      if (!Number.isNaN(numeric)) {
        if (numeric >= 9) return 'CRITICAL';
        if (numeric >= 7) return 'WARNING';
        if (numeric >= 4) return 'CAUTION';
      }
      return 'NORMAL';
    }

    async function ensureMicrophoneAccess() {
      if (sessionState.micReady) return true;

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        return false;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach((track) => track.stop());
        sessionState.micReady = true;
        return true;
      } catch (_error) {
        return false;
      }
    }

    async function playAudioElement(audioBlob) {
      const audioUrl = URL.createObjectURL(audioBlob);
      const audio = new Audio(audioUrl);
      audio.volume = 1;
      audio.setAttribute('playsinline', 'true');

      await new Promise((resolve) => {
        const finish = () => {
          URL.revokeObjectURL(audioUrl);
          resolve();
        };
        audio.onended = finish;
        audio.onerror = finish;
        audio.play().catch(finish);
      });
    }

    async function promptForFallbackResponse() {
      const typed = window.prompt('Speech recognition was unavailable. Type your response:') || '';
      return { transcript: typed.trim(), latencyMs: 2500 };
    }

    async function speakWithBrowserFallback(text) {
      if (!('speechSynthesis' in window)) return;

      await new Promise((resolve) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1;
        utterance.pitch = 1;
        utterance.volume = 1;
        utterance.onend = resolve;
        utterance.onerror = resolve;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      });
    }

    async function speak(text) {
      if (!text) return;

      document.body.classList.add('speaking');

      try {
        const response = await fetch(`${SERVER}/api/speak`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, voiceId: VOICE_ID })
        });

        if (!response.ok) {
          let errorMessage = 'Speak request failed';
          try {
            const payload = await response.json();
            errorMessage = payload?.error || errorMessage;
          } catch (_parseError) {
            // no-op
          }
          throw new Error(errorMessage);
        }

        const audioBlob = await response.blob();
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;

        if (AudioContextClass) {
          const audioContext = new AudioContextClass();
          try {
            if (audioContext.state === 'suspended') {
              await audioContext.resume();
            }

            const audioBuffer = await audioBlob.arrayBuffer();
            const decoded = await audioContext.decodeAudioData(audioBuffer.slice(0));
            const source = audioContext.createBufferSource();
            const gainNode = audioContext.createGain();

            gainNode.gain.value = 1.6;
            source.buffer = decoded;
            source.connect(gainNode);
            gainNode.connect(audioContext.destination);

            await new Promise((resolve) => {
              source.onended = resolve;
              source.start(0);
            });
          } catch (_error) {
            await playAudioElement(audioBlob);
          } finally {
            await audioContext.close();
          }
        } else {
          await playAudioElement(audioBlob);
        }
      } catch (_error) {
        await speakWithBrowserFallback(text);
      } finally {
        document.body.classList.remove('speaking');
      }
    }

    async function listenForResponse() {
      if (sessionState.demoMode) {
        const item = demoScenarios[sessionState.demoScenarioIndex % demoScenarios.length];
        sessionState.demoScenarioIndex += 1;
        await new Promise((resolve) => setTimeout(resolve, 350));
        return item;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        return promptForFallbackResponse();
      }

      const hasMic = await ensureMicrophoneAccess();
      if (!hasMic) {
        return promptForFallbackResponse();
      }

      return new Promise((resolve) => {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        let listenStartTime = Date.now();
        let latencyMs = 8000;
        let settled = false;

        const settle = (payload) => {
          if (settled) return;
          settled = true;
          clearTimeout(timeoutId);
          try {
            recognition.stop();
          } catch (_error) {
            // no-op
          }
          resolve(payload);
        };

        recognition.onstart = () => {
          listenStartTime = Date.now();
        };

        recognition.onspeechstart = () => {
          latencyMs = Date.now() - listenStartTime;
        };

        recognition.onresult = (event) => {
          const transcript = event.results?.[0]?.[0]?.transcript?.trim() || '';
          settle({ transcript, latencyMs });
        };

        recognition.onerror = () => {
          settle({ transcript: '', latencyMs });
        };

        recognition.onnomatch = () => {
          settle({ transcript: '', latencyMs });
        };

        recognition.onend = () => {
          const elapsedMs = Date.now() - listenStartTime;
          if (elapsedMs > 1500) {
            settle({ transcript: '', latencyMs });
          }
        };

        const timeoutId = setTimeout(() => {
          settle({ transcript: '', latencyMs: 10000 });
        }, 10000);

        recognition.start();
      });
    }

    async function captureDriverResponse() {
      let response = await listenForResponse();
      if (response.transcript) return response;

      await speak('I did not catch that. Please repeat your response.');
      response = await listenForResponse();
      return response;
    }

    function startWakeWordListening() {
      if (!wakeWordEnabled || wakeWordSuspended) return;

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return;

      wakeRecognition = new SR();
      wakeRecognition.continuous = true;
      wakeRecognition.interimResults = true;
      wakeRecognition.lang = 'en-US';

      wakeRecognition.onstart = () => {
        wakeDot.classList.add('listening');
        wakeLabel.textContent = 'Say "okay truckguard"';
      };

      wakeRecognition.onresult = (event) => {
        if (assistantActive) return;

        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          const transcript = event.results[i][0].transcript;
          const detected = isWakePhraseDetected(transcript);

          if (detected) {
            wakeRecognition.stop();
            triggerAssistant();
            return;
          }
        }
      };

      wakeRecognition.onerror = () => {
        setTimeout(() => {
          if (wakeWordEnabled && !assistantActive && !wakeWordSuspended) startWakeWordListening();
        }, 1000);
      };

      wakeRecognition.onend = () => {
        setTimeout(() => {
          if (wakeWordEnabled && !assistantActive && !wakeWordSuspended) startWakeWordListening();
        }, 300);
      };

      try {
        wakeRecognition.start();
      } catch (_error) {
        // no-op
      }
    }

    function stopWakeWordListening(suspend = false) {
      wakeWordSuspended = suspend;
      if (wakeRecognition) {
        try { wakeRecognition.stop(); } catch (_error) { /* no-op */ }
        wakeRecognition = null;
      }
      wakeDot.classList.remove('listening');
    }

    function resumeWakeWordListening() {
      wakeWordSuspended = false;
      if (wakeWordEnabled && !assistantActive) {
        startWakeWordListening();
      }
    }

    async function triggerAssistant() {
      stopWakeWordListening(true);
      assistantActive = true;
      assistantOverlay.classList.add('active');
      assistantLabel.textContent = 'What do you need?';
      assistantQuestion.textContent = '';

      await speak('What do you need help with?');

      assistantLabel.textContent = 'Listening...';
      const { transcript } = await listenForResponse();

      if (!transcript) {
        assistantLabel.textContent = 'Did not catch that.';
        await speak('Sorry, I did not catch that. Try again after saying okay truckguard.');
        closeAssistant();
        return;
      }

      assistantQuestion.textContent = `"${transcript}"`;
      assistantLabel.textContent = 'Thinking...';

      try {
        const response = await fetch(`${SERVER}/api/assistant`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: transcript })
        });

        const data = await response.json();
        const answer = data.answer || 'Sorry, I could not get an answer right now.';

        assistantLabel.textContent = 'Answering...';
        await speak(answer);
      } catch (_error) {
        await speak('Sorry, I could not connect to get an answer right now.');
      }

      closeAssistant();
    }

    function closeAssistant() {
      assistantActive = false;
      assistantOverlay.classList.remove('active');
      assistantLabel.textContent = 'Listening...';
      assistantQuestion.textContent = '';

      if (wakeWordEnabled) {
        setTimeout(() => resumeWakeWordListening(), 500);
      }
    }

    function updateAlertLevel(level) {
      sessionState.currentLevel = level;

      statusCircle.classList.remove('pulse-warning', 'pulse-critical');
      edgeFlash.classList.remove('active');

      if (level === 'NORMAL') {
        statusCircle.style.backgroundColor = '#22c55e';
        statusCircle.style.color = '#22c55e';
        statusCircle.style.boxShadow = '0 0 22px rgba(34, 197, 94, 0.65), 0 0 92px rgba(34, 197, 94, 0.3)';
        alertLabel.textContent = 'ALL CLEAR';
        return;
      }

      if (level === 'CAUTION') {
        statusCircle.style.backgroundColor = '#eab308';
        statusCircle.style.color = '#eab308';
        statusCircle.style.boxShadow = '0 0 22px rgba(234, 179, 8, 0.65), 0 0 92px rgba(234, 179, 8, 0.3)';
        alertLabel.textContent = 'CAUTION';
        return;
      }

      if (level === 'WARNING') {
        statusCircle.style.backgroundColor = '#f97316';
        statusCircle.style.color = '#f97316';
        statusCircle.style.boxShadow = '0 0 24px rgba(249, 115, 22, 0.75), 0 0 102px rgba(249, 115, 22, 0.35)';
        statusCircle.classList.add('pulse-warning');
        alertLabel.textContent = 'WARNING';
        return;
      }

      statusCircle.style.backgroundColor = '#ef4444';
      statusCircle.style.color = '#ef4444';
      statusCircle.style.boxShadow = '0 0 26px rgba(239, 68, 68, 0.85), 0 0 110px rgba(239, 68, 68, 0.4)';
      statusCircle.classList.add('pulse-critical');
      edgeFlash.classList.add('active');
      alertLabel.textContent = 'CRITICAL';
      if (typeof navigator !== 'undefined' && typeof navigator.vibrate === 'function') {
        navigator.vibrate([200, 100, 200, 100, 400]);
      }
    }

    async function speakIntervention(level, llmAnalysis) {
      if (level === 'NORMAL') {
        await speak('All good. Keep it up out there.');
        return;
      }

      if (level === 'CAUTION') {
        await speak("You're doing alright, but it might be worth taking a short break at the next stop.");
        return;
      }

      if (level === 'WARNING') {
        await speak('I am detecting some fatigue signals. I strongly recommend pulling over at the next rest area. Your safety comes first.');
        return;
      }

      await speak('I am seriously concerned about your alertness. Please pull over safely as soon as possible. Do not push through this.');
    }

    async function runCheckIn() {
      if (!sessionState.sessionId) return;

      // Stop wake word so it doesn't fight the mic
      stopWakeWordListening(true);

      const question = 'Quick check - how are you holding up out there?';

      try {
        await speak(question);
        const { transcript, latencyMs } = await captureDriverResponse();
        const hoursOnRoad = (Date.now() - sessionState.startTime) / 3600000;

        const response = await fetch(`${SERVER}/api/checkin`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            transcript,
            latencyMs,
            hoursOnRoad,
            checkInNumber: sessionState.checkInCount++,
            sessionId: sessionState.sessionId
          })
        });

        if (!response.ok) {
          throw new Error('Check-in request failed');
        }

        const { score, level, llmAnalysis } = await response.json();
        const normalizedLevel = normalizeServerLevel(level, score);

        sessionState.lastCheckInAt = Date.now();
        sessionState.recentScores.push({ score, level: normalizedLevel });
        sessionState.recentScores = sessionState.recentScores.slice(-5);
        updateLastCheckInText();
        renderHistory();

        updateAlertLevel(normalizedLevel);
        await speakIntervention(normalizedLevel, llmAnalysis);
      } catch (_error) {
        await speak('Unable to complete check in right now. Please try again shortly.');
      } finally {
        // Always restart wake word when done, whether it succeeded or failed
        if (wakeWordEnabled) {
          setTimeout(() => resumeWakeWordListening(), 500);
        }
      }
    }

    async function startShift(driverName, truckId) {
      const response = await fetch(`${SERVER}/api/sessions/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ driverName, truckId })
      });

      if (!response.ok) {
        throw new Error('Failed to start session');
      }

      const data = await response.json();
      sessionState.sessionId = data.sessionId;
      sessionState.driverName = driverName || 'Driver';
      sessionState.startTime = sessionState.demoMode
        ? Date.now() - 5 * 60 * 60 * 1000
        : Date.now();
      sessionState.checkInCount = 0;

      if (sessionState.checkInInterval) {
        clearInterval(sessionState.checkInInterval);
      }

      sessionState.checkInInterval = setInterval(() => {
        runCheckIn();
      }, 7200000);

      checkInBtn.disabled = false;

      await speak("Shift started. I'll check in with you every two hours. Stay safe out there.");
    }

    async function pingServer() {
      try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 3000);

        const response = await fetch(`${SERVER}/api/sessions`, {
          method: 'GET',
          signal: controller.signal
        });

        clearTimeout(timer);

        if (!response.ok) {
          throw new Error('Ping failed');
        }

        connectionDot.classList.add('connected');
      } catch (_error) {
        connectionDot.classList.remove('connected');
      }
    }

    function openStartOverlay() {
      startOverlay.classList.remove('hidden');
      driverNameInput.focus();
    }

    function closeStartOverlay() {
      startOverlay.classList.add('hidden');
    }

    let tapTimes = [];
    function handleLogoTap() {
      const now = Date.now();
      tapTimes.push(now);
      tapTimes = tapTimes.filter((time) => now - time < 900);
      if (tapTimes.length >= 3) {
        tapTimes = [];
        sessionState.demoMode = true;
        sessionState.startTime = Date.now() - 5 * 60 * 60 * 1000;
        demoBadge.classList.add('active');
      }
    }

    startShiftBtn.addEventListener('click', openStartOverlay);

    cancelStartBtn.addEventListener('click', closeStartOverlay);

    confirmStartBtn.addEventListener('click', async () => {
      const driverName = driverNameInput.value.trim() || 'Driver';
      const truckId = truckIdInput.value.trim() || 'Unknown';

      confirmStartBtn.disabled = true;
      try {
        await ensureMicrophoneAccess();
        await startShift(driverName, truckId);
        closeStartOverlay();
        setTimeout(() => {
          wakeWordEnabled = true;
          resumeWakeWordListening();
        }, 3000);
      } catch (_error) {
        await speak('Unable to start shift right now. Check server connection and try again.');
      } finally {
        confirmStartBtn.disabled = false;
      }
    });

    checkInBtn.addEventListener('click', () => {
      runCheckIn();
    });

    historyToggle.addEventListener('click', () => {
      historyPanel.classList.toggle('open');
    });

    logoTap.addEventListener('click', handleLogoTap);

    updateAlertLevel('NORMAL');
    updateLastCheckInText();
    renderHistory();
    pingServer();
    setInterval(pingServer, 5000);
    setInterval(updateLastCheckInText, 30000);
  </script>
</body>
